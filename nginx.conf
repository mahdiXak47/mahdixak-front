upstream finance_api {
    server 127.0.0.1:4000;
    keepalive 8;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name mahdixak.ir www.mahdixak.ir;

    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mahdixak.ir www.mahdixak.ir;
    
    # Frontend static files (output of: npm run build inside /frontend)
    root /var/www/mahdixak/frontend/dist;
    index index.html;

    # Security headers
    add_header X-Frame-Options       DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy       strict-origin-when-cross-origin;

    # ── API → Node backend ────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://finance_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection     "";
        proxy_set_header   Host           $host;
        proxy_set_header   X-Real-IP      $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Static assets (cache aggressively — Vite hashes filenames) ────────────
    location ~* \.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback — all other routes serve index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
